name: test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # pnpm version is read from package.json "packageManager" (pnpm@11.5.0).
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Browser-mode tests need a real Chromium (+ its OS libs) on the runner.
      - name: Install Chromium for browser tests
        run: pnpm exec playwright install --with-deps chromium

      - name: Run tests (node + browser projects)
        run: pnpm test # = "vitest run", both projects headless

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: svelte-check
        run: pnpm check

      - name: lint (eslint + prettier)
        run: pnpm lint
